<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design Execution — CC Payments for Agent Debt | PRD #01</title>
<style>
/* ── Design Tokens ───────────────────────────────────────────────── */
:root {
  --primary-cypress-5:   #f3f7f7;
  --primary-cypress-10:  #e6efee;
  --primary-cypress-25:  #c0d8d5;
  --primary-cypress-50:  #82b0ab;
  --primary-cypress-75:  #438981;
  --primary-cypress-100: #056257;
  --primary-cypress-150: #04463e;
  --secondary-spearmint-100: #0a9742;
  --secondary-spearmint-25:  #c2e5d0;
  --secondary-ocean-100: #336cc3;
  --secondary-ocean-15:  #deebff;
  --secondary-salamander-100: #f26d00;
  --secondary-salamander-25:  #fcdabf;
  --neutrals-night-5:   #f4f4f4;
  --neutrals-night-10:  #e9e9e9;
  --neutrals-night-20:  #d4d4d4;
  --neutrals-night-40:  #a9a9a9;
  --neutrals-night-60:  #7e7e7e;
  --neutrals-night-80:  #525252;
  --neutrals-night-100: #272727;
  --utility-error-carmine-red-100: #f44b40;
  --utility-error-carmine-red-5:   #fff6f6;
  --utility-success-cypress-100: #056257;
  --utility-success-cypress-5:   #f3f7f7;
  --utility-warning-royal-orange-100: #f49640;
  --utility-info-ocean-100: #336cc3;
  --utility-info-ocean-5:   #f5f8fc;
  --spacing-xs: 4px; --spacing-sm: 8px; --spacing-md: 12px;
  --spacing-lg: 16px; --spacing-xl: 20px; --spacing-2xl: 24px;
  --spacing-3xl: 32px; --spacing-4xl: 64px;
  --radii-1: 4px; --radii-2: 8px; --radii-4: 16px; --radii-5: 32px;
}

/* ── Shell ───────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #1a1a2e; color: var(--neutrals-night-100); display: flex; height: 100vh; overflow: hidden; }

/* ── Left nav (screen list) ──────────────────────────────────────── */
#screen-nav { width: 220px; background: #111827; color: #e5e7eb; display: flex; flex-direction: column; overflow-y: auto; flex-shrink: 0; }
#screen-nav .nav-header { padding: var(--spacing-lg); border-bottom: 1px solid #374151; }
#screen-nav .nav-header h2 { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: #9ca3af; margin-bottom: 4px; }
#screen-nav .nav-header p { font-size: 12px; color: #6b7280; line-height: 1.4; }
#screen-nav .nav-group { padding: var(--spacing-sm) 0; border-bottom: 1px solid #1f2937; }
#screen-nav .nav-group-label { padding: 6px var(--spacing-lg); font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: #6b7280; }
#screen-nav button.nav-item { width: 100%; text-align: left; padding: 8px var(--spacing-lg); background: none; border: none; color: #d1d5db; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: background .15s; }
#screen-nav button.nav-item:hover { background: #1f2937; }
#screen-nav button.nav-item.active { background: #065f46; color: #fff; font-weight: 600; }
#screen-nav button.nav-item .badge { font-size: 10px; background: #374151; border-radius: 3px; padding: 1px 5px; color: #9ca3af; }
#screen-nav button.nav-item.active .badge { background: #047857; color: #fff; }

/* ── Main area ───────────────────────────────────────────────────── */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* ── Top bar ─────────────────────────────────────────────────────── */
#top-bar { background: #111827; border-bottom: 1px solid #374151; padding: var(--spacing-md) var(--spacing-2xl); display: flex; align-items: center; gap: var(--spacing-lg); flex-shrink: 0; }
#top-bar h1 { font-size: 14px; font-weight: 600; color: #f9fafb; flex: 1; }
#top-bar .prd-ref { font-size: 11px; color: #6b7280; }
.state-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
.state-tab { padding: 4px 12px; border-radius: 20px; font-size: 12px; border: 1px solid #374151; background: none; color: #9ca3af; cursor: pointer; transition: all .15s; }
.state-tab:hover { border-color: #6b7280; color: #d1d5db; }
.state-tab.active { background: #056257; border-color: #056257; color: #fff; font-weight: 600; }

/* ── Canvas ──────────────────────────────────────────────────────── */
#canvas { flex: 1; overflow-y: auto; display: flex; align-items: flex-start; justify-content: center; padding: var(--spacing-3xl) var(--spacing-2xl); background: #0f172a; }

/* Portal frame */
.portal-frame { width: 1100px; min-height: 700px; background: var(--neutrals-night-5); border-radius: var(--radii-4); overflow: hidden; box-shadow: 0 25px 60px rgba(0,0,0,.5); display: flex; }

/* Portal sidebar */
.portal-sidebar { width: 80px; background: #fff; border-right: 1px solid var(--neutrals-night-10); display: flex; flex-direction: column; align-items: center; padding: var(--spacing-lg) 0; gap: 4px; flex-shrink: 0; }
.portal-sidebar .logo { width: 40px; height: 24px; margin-bottom: var(--spacing-lg); display: flex; align-items: center; justify-content: center; }
.portal-sidebar .logo span { font-size: 10px; font-weight: 800; color: var(--primary-cypress-100); letter-spacing: -.02em; }
.sidebar-item { width: 60px; padding: 8px 4px; display: flex; flex-direction: column; align-items: center; gap: 3px; border-radius: var(--radii-2); cursor: pointer; transition: background .15s; }
.sidebar-item:hover { background: var(--primary-cypress-5); }
.sidebar-item.active { background: var(--primary-cypress-5); }
.sidebar-item .icon { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; color: var(--neutrals-night-60); font-size: 18px; }
.sidebar-item.active .icon { color: var(--primary-cypress-100); }
.sidebar-item .label { font-size: 9px; color: var(--neutrals-night-60); text-align: center; line-height: 1.2; }
.sidebar-item.active .label { color: var(--primary-cypress-100); font-weight: 600; }
.sidebar-divider { width: 40px; height: 1px; background: var(--neutrals-night-10); margin: 4px 0; }
.sidebar-item.active::before { content: ''; position: absolute; left: 0; width: 3px; height: 36px; background: var(--primary-cypress-100); border-radius: 0 2px 2px 0; }
.sidebar-item { position: relative; }

/* Portal content */
.portal-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* Portal top bar */
.portal-topbar { height: 52px; background: #fff; border-bottom: 1px solid var(--neutrals-night-10); display: flex; align-items: center; padding: 0 var(--spacing-2xl); gap: var(--spacing-lg); }
.portal-topbar .env-banner { flex: 1; background: #f26d00; color: #fff; font-size: 12px; font-weight: 600; padding: 6px var(--spacing-lg); border-radius: var(--radii-1); text-align: center; display: flex; align-items: center; justify-content: center; gap: var(--spacing-sm); }
.portal-topbar .env-banner button { background: #fff; color: #f26d00; border: none; border-radius: 3px; padding: 2px 10px; font-size: 11px; font-weight: 700; cursor: pointer; }
.portal-topbar .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--primary-cypress-100); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 12px; font-weight: 700; }
.portal-topbar .notif { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; color: var(--neutrals-night-60); font-size: 18px; cursor: pointer; }

/* Portal page */
.portal-page { flex: 1; overflow-y: auto; padding: var(--spacing-3xl); }

/* Page header */
.page-header { margin-bottom: var(--spacing-3xl); }
.page-header h1 { font-size: 32px; font-weight: 700; color: var(--neutrals-night-100); display: flex; align-items: center; gap: var(--spacing-md); }
.page-header h1 .agent-select { font-size: 14px; font-weight: 500; color: var(--neutrals-night-80); background: #fff; border: 1px solid var(--neutrals-night-20); border-radius: var(--radii-5); padding: 4px 12px 4px 10px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
.page-header p { font-size: 14px; color: var(--neutrals-night-60); margin-top: 4px; }

/* Comp overview */
.section-label { font-size: 16px; font-weight: 600; color: var(--neutrals-night-100); margin-bottom: var(--spacing-lg); display: flex; align-items: center; gap: var(--spacing-md); }
.comp-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--spacing-lg); margin-bottom: var(--spacing-2xl); }
.comp-card { background: #fff; border: 1px solid var(--neutrals-night-10); border-radius: var(--radii-4); padding: var(--spacing-2xl); position: relative; }
.comp-card .card-icon { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--neutrals-night-20); display: flex; align-items: center; justify-content: center; font-size: 14px; margin-bottom: var(--spacing-lg); color: var(--neutrals-night-60); }
.comp-card .card-arrow { position: absolute; top: var(--spacing-lg); right: var(--spacing-lg); width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid var(--neutrals-night-20); display: flex; align-items: center; justify-content: center; color: var(--neutrals-night-60); font-size: 14px; cursor: pointer; }
.comp-card .card-amount { font-size: 28px; font-weight: 700; color: var(--neutrals-night-100); margin-bottom: 4px; }
.comp-card .card-amount.red { color: var(--utility-error-carmine-red-100); }
.comp-card .card-amount.blue { color: var(--secondary-ocean-100); }
.comp-card .card-amount.green { color: var(--utility-success-cypress-100); }
.comp-card .card-label { font-size: 14px; color: var(--neutrals-night-80); }
.comp-card .card-label small { color: var(--neutrals-night-60); }

/* Bottom grid */
.bottom-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-lg); }

/* Debt overview card */
.debt-card { background: #fff; border: 1px solid var(--neutrals-night-10); border-radius: var(--radii-4); padding: var(--spacing-2xl); }
.debt-card .debt-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--spacing-xl); }
.debt-card .debt-header h3 { font-size: 16px; font-weight: 600; }
.debt-card .debt-header .arrow { width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid var(--neutrals-night-20); display: flex; align-items: center; justify-content: center; color: var(--neutrals-night-60); font-size: 14px; cursor: pointer; }
.debt-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--neutrals-night-10); }
.debt-row:last-of-type { border-bottom: none; }
.debt-row .debt-label { font-size: 15px; color: var(--neutrals-night-80); }
.debt-row .debt-label.bold { font-weight: 700; color: var(--neutrals-night-100); font-size: 16px; }
.debt-row .debt-amount { font-size: 15px; color: var(--utility-error-carmine-red-100); font-weight: 600; }
.debt-row .debt-amount.bold { font-size: 16px; font-weight: 700; }
.debt-actions { margin-top: var(--spacing-xl); display: flex; gap: var(--spacing-sm); }

/* Buttons */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; border-radius: var(--radii-2); font-size: 14px; font-weight: 600; cursor: pointer; transition: all .15s; border: none; padding: 0 var(--spacing-xl); height: 44px; }
.btn-primary { background: var(--primary-cypress-100); color: #fff; }
.btn-primary:hover { background: var(--primary-cypress-150); }
.btn-secondary { background: #fff; color: var(--neutrals-night-100); border: 1.5px solid var(--neutrals-night-20); }
.btn-secondary:hover { border-color: var(--neutrals-night-40); }
.btn-outline-full { width: 100%; background: #fff; border: 1.5px solid var(--neutrals-night-20); color: var(--neutrals-night-100); border-radius: var(--radii-2); padding: 12px; font-size: 14px; font-weight: 600; cursor: pointer; }
.btn-outline-full:hover { border-color: var(--neutrals-night-40); }
.btn-sm { height: 36px; font-size: 13px; padding: 0 var(--spacing-lg); }
.btn-full { width: 100%; }
.btn-loading { opacity: .7; cursor: wait; }
.btn-disabled { opacity: .4; cursor: not-allowed; }

/* Roll-up card */
.rollup-card { background: #fff; border: 1px solid var(--neutrals-night-10); border-radius: var(--radii-4); padding: var(--spacing-2xl); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: var(--spacing-lg); }
.rollup-card .rollup-icon { font-size: 48px; }
.rollup-card h4 { font-size: 16px; font-weight: 700; color: var(--neutrals-night-100); }
.rollup-card p { font-size: 13px; color: var(--neutrals-night-60); line-height: 1.5; }

/* ── Modal overlay ───────────────────────────────────────────────── */
.modal-overlay { position: absolute; inset: 0; background: rgba(0,0,0,.45); display: flex; align-items: center; justify-content: center; z-index: 100; }
.modal { background: #fff; border-radius: var(--radii-4); width: 460px; max-height: 90%; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
.modal-header { padding: var(--spacing-2xl); border-bottom: 1px solid var(--neutrals-night-10); display: flex; align-items: center; justify-content: space-between; }
.modal-header h2 { font-size: 18px; font-weight: 700; }
.modal-header .step-indicator { font-size: 12px; color: var(--neutrals-night-60); }
.modal-close { width: 32px; height: 32px; border-radius: 50%; border: none; background: var(--neutrals-night-5); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; color: var(--neutrals-night-60); flex-shrink: 0; }
.modal-body { padding: var(--spacing-2xl); display: flex; flex-direction: column; gap: var(--spacing-xl); }
.modal-footer { padding: var(--spacing-lg) var(--spacing-2xl) var(--spacing-2xl); display: flex; gap: var(--spacing-sm); }

/* Step dots */
.step-dots { display: flex; gap: 6px; align-items: center; padding: 0 var(--spacing-2xl) var(--spacing-sm); }
.step-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--neutrals-night-20); }
.step-dot.active { background: var(--primary-cypress-100); width: 20px; border-radius: 4px; }

/* Form elements */
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-label { font-size: 13px; font-weight: 600; color: var(--neutrals-night-80); }
.form-input { height: 48px; border: 1.5px solid var(--neutrals-night-20); border-radius: var(--radii-2); padding: 0 var(--spacing-lg); font-size: 14px; color: var(--neutrals-night-100); background: #fff; outline: none; transition: border-color .15s; width: 100%; }
.form-input:focus { border-color: var(--primary-cypress-100); }
.form-input.error { border-color: var(--utility-error-carmine-red-100); }
.form-hint { font-size: 12px; color: var(--neutrals-night-60); }
.form-hint.warning { color: var(--secondary-salamander-100); }
.input-row { display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-sm); }

/* Stripe placeholder */
.stripe-field { height: 48px; border: 1.5px solid var(--neutrals-night-20); border-radius: var(--radii-2); padding: 0 var(--spacing-lg); display: flex; align-items: center; gap: var(--spacing-sm); background: #fff; }
.stripe-field .stripe-badge { font-size: 10px; font-weight: 700; color: #635bff; background: #f0effe; border-radius: 3px; padding: 1px 5px; margin-left: auto; }
.stripe-field span { font-size: 14px; color: var(--neutrals-night-40); }

/* Radio method selector */
.method-selector { display: flex; gap: var(--spacing-sm); }
.method-option { flex: 1; border: 1.5px solid var(--neutrals-night-20); border-radius: var(--radii-2); padding: var(--spacing-lg); cursor: pointer; display: flex; align-items: center; gap: var(--spacing-md); transition: all .15s; }
.method-option:hover { border-color: var(--primary-cypress-50); }
.method-option.selected { border-color: var(--primary-cypress-100); background: var(--primary-cypress-5); }
.method-option .radio { width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--neutrals-night-40); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.method-option.selected .radio { border-color: var(--primary-cypress-100); }
.method-option.selected .radio::after { content: ''; width: 8px; height: 8px; border-radius: 50%; background: var(--primary-cypress-100); }
.method-option.disabled { opacity: .45; cursor: not-allowed; background: var(--neutrals-night-5); }
.method-label { font-size: 14px; font-weight: 600; }
.method-sub { font-size: 12px; color: var(--neutrals-night-60); }

/* Toggle / checkbox */
.toggle-row { display: flex; align-items: center; gap: var(--spacing-md); }
.toggle-box { width: 18px; height: 18px; border: 1.5px solid var(--neutrals-night-20); border-radius: 3px; flex-shrink: 0; }
.toggle-label { font-size: 13px; color: var(--neutrals-night-80); }

/* Fee breakdown */
.fee-breakdown { background: var(--neutrals-night-5); border-radius: var(--radii-2); padding: var(--spacing-lg); display: flex; flex-direction: column; gap: 8px; }
.fee-row { display: flex; justify-content: space-between; align-items: center; font-size: 14px; color: var(--neutrals-night-80); }
.fee-row.total { font-weight: 700; color: var(--neutrals-night-100); font-size: 16px; padding-top: 8px; border-top: 1px solid var(--neutrals-night-20); margin-top: 4px; }
.fee-label-tag { font-size: 11px; background: var(--secondary-salamander-25); color: var(--secondary-salamander-100); border-radius: var(--radii-1); padding: 1px 6px; margin-left: 4px; }

/* Alert */
.alert { border-radius: var(--radii-2); padding: var(--spacing-lg); display: flex; gap: var(--spacing-md); align-items: flex-start; }
.alert-error { background: var(--utility-error-carmine-red-5); border: 1px solid #fca5a5; }
.alert-warning { background: #fffaf6; border: 1px solid var(--secondary-salamander-25); }
.alert-info { background: var(--utility-info-ocean-5); border: 1px solid var(--secondary-ocean-15); }
.alert-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.alert-text { font-size: 13px; line-height: 1.5; }
.alert-text strong { display: block; font-weight: 700; margin-bottom: 2px; }

/* Success state */
.success-state { display: flex; flex-direction: column; align-items: center; text-align: center; padding: var(--spacing-4xl) var(--spacing-2xl); gap: var(--spacing-lg); }
.success-icon { width: 64px; height: 64px; border-radius: 50%; background: var(--utility-success-cypress-5); display: flex; align-items: center; justify-content: center; font-size: 28px; }
.success-title { font-size: 20px; font-weight: 700; color: var(--neutrals-night-100); }
.success-sub { font-size: 14px; color: var(--neutrals-night-60); line-height: 1.5; }
.receipt-box { width: 100%; background: var(--neutrals-night-5); border-radius: var(--radii-2); padding: var(--spacing-lg); display: flex; flex-direction: column; gap: 8px; }
.receipt-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--neutrals-night-80); }
.receipt-row.total { font-weight: 700; color: var(--neutrals-night-100); border-top: 1px solid var(--neutrals-night-20); padding-top: 8px; margin-top: 4px; }

/* ── D2 Stepper layout ───────────────────────────────────────────── */
.stepper-page { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
.stepper-back { padding: var(--spacing-lg) var(--spacing-3xl); border-bottom: 1px solid var(--neutrals-night-10); background: #fff; }
.stepper-back a { font-size: 14px; color: var(--primary-cypress-100); text-decoration: none; display: inline-flex; align-items: center; gap: 6px; font-weight: 500; }
.stepper-body { display: flex; flex: 1; }
.stepper-sidebar { width: 220px; padding: var(--spacing-3xl); border-right: 1px solid var(--neutrals-night-10); background: #fff; flex-shrink: 0; }
.stepper-sidebar h3 { font-size: 16px; font-weight: 700; margin-bottom: var(--spacing-2xl); }
.progress-steps { display: flex; flex-direction: column; gap: 0; }
.progress-step { display: flex; gap: var(--spacing-md); position: relative; padding-bottom: var(--spacing-2xl); }
.progress-step:last-child { padding-bottom: 0; }
.progress-step::before { content: ''; position: absolute; left: 11px; top: 24px; bottom: 0; width: 2px; background: var(--neutrals-night-20); }
.progress-step:last-child::before { display: none; }
.progress-step.done::before { background: var(--primary-cypress-100); }
.step-circle { width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--neutrals-night-20); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; color: var(--neutrals-night-60); background: #fff; z-index: 1; }
.progress-step.done .step-circle { background: var(--primary-cypress-100); border-color: var(--primary-cypress-100); color: #fff; }
.progress-step.current .step-circle { border-color: var(--primary-cypress-100); color: var(--primary-cypress-100); }
.step-info { padding-top: 2px; }
.step-name { font-size: 13px; font-weight: 600; color: var(--neutrals-night-100); }
.progress-step.next .step-name { color: var(--neutrals-night-40); font-weight: 400; }
.step-sub { font-size: 12px; color: var(--neutrals-night-60); margin-top: 2px; }
.stepper-content { flex: 1; padding: var(--spacing-3xl); background: var(--neutrals-night-5); overflow-y: auto; }
.stepper-content h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
.stepper-content .step-desc { font-size: 14px; color: var(--neutrals-night-60); margin-bottom: var(--spacing-2xl); }
.stepper-card { background: #fff; border: 1px solid var(--neutrals-night-10); border-radius: var(--radii-4); padding: var(--spacing-2xl); }
.stepper-nav { display: flex; justify-content: space-between; align-items: center; margin-top: var(--spacing-2xl); }

/* Debt summary table (D2 Step 1) */
.debt-summary { display: flex; flex-direction: column; gap: 10px; }
.debt-source-row { display: flex; align-items: center; justify-content: space-between; padding: 10px; background: var(--neutrals-night-5); border-radius: var(--radii-1); }
.debt-source-info .policy { font-size: 14px; font-weight: 600; }
.debt-source-info .reason { font-size: 12px; color: var(--neutrals-night-60); margin-top: 2px; }

// ── Router ───────────────────────────────────────────────────────────
let currentScreen = 's1';
let currentState  = 'default';

function showScreen(id, state) {
  currentScreen = id;
  currentState  = state || screens[id].states[0];

  // Update nav
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b => {
    if (b.getAttribute('onclick') && b.getAttribute('onclick').includes(`'${id}'`)) b.classList.add('active');
  });

  // Update top bar
  document.getElementById('screen-title').textContent = screens[id].title;
  const tabs = document.getElementById('state-tabs');
  tabs.innerHTML = screens[id].states.map(s =>
    `<button class="state-tab ${s === currentState ? 'active' : ''}" onclick="showScreen('${id}','${s}')">${s}</button>`
  ).join('');

  // Render
  document.getElementById('portal-content').innerHTML = screens[id].render(currentState);
}
